<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Congressional Speech Portal</title>

  <link rel="stylesheet" href="styles/styles.css" />

  <!-- Papa Parse for CSV loading -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <!-- Chart.js for visualization -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <div class="container">
    <h1>Congressional Speech Portal</h1>

    <div class="filters">
      <select id="partyFilter">
        <option value="">All Parties</option>
      </select>

      <select id="chamberFilter">
        <option value="">All Chambers</option>
      </select>

      <select id="yearFilter">
        <option value="">All Years</option>
      </select>

      <select id="policyFilter">
        <option value="">All Policy Claiming</option>
      </select>

      <button id="downloadBtn">Download Filtered CSV</button>
    </div>

    <div id="summary"></div>

    <canvas id="resultsChart"></canvas>

    <table id="previewTable"></table>
  </div>

  <script src="scripts/main.js"></script>
</body>
</html>
